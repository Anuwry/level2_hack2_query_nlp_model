<!doctype html>
<html lang="th">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>CCTV Query</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="query-pane" aria-labelledby="query-title">
        <div class="brand-row">
          <div>
            <p class="eyebrow">CCTV Log Query</p>
            <h1 id="query-title">ถามข้อมูลรถจาก CSV</h1>
          </div>
          <span class="status-pill" id="statusPill">Local</span>
        </div>

        <form id="queryForm" class="query-form">
          <label for="question">คำถาม</label>
          <textarea
            id="question"
            name="question"
            rows="5"
            autocomplete="off"
            spellcheck="false"
          >วันที่ 12 รถคันไหนวิ่งผ่านบ้างไม่ซ้ำกัน</textarea>
          <div class="action-row">
            <button type="submit" id="submitButton">Query</button>
            <button type="button" id="clearButton" class="secondary">Clear</button>
          </div>
          <label class="toggle-row" for="llmToggle">
            <input type="checkbox" id="llmToggle" />
            <span>LLM normalize</span>
          </label>
        </form>

        <div class="sample-grid" aria-label="ตัวอย่างคำถาม">
          <button type="button" data-question="วันที่ 12 มีรถ Toyota ผ่านกี่คัน">Toyota วันที่ 12</button>
          <button type="button" data-question="12 05 2026 มี Benz เข้าออกกี่คันแล้วมีสีอะไรบ้าง">Benz สีอะไรบ้าง</button>
          <button type="button" data-question="วันที่ 12 รถ Toyota ช่วง 22:00-23:00 เดินทางไปทางไหนบ้าง">Toyota route</button>
          <button type="button" data-question="วันที่ 12 กล้องตัวที่ 1 มีรถส่วนบุคคลผ่านกี่คัน">CCTV01 รถส่วนบุคคล</button>
        </div>

        <form id="csvForm" class="csv-form">
          <div class="section-title">
            <h2>CSV Questions</h2>
            <button type="button" id="loadCsvSampleButton" class="secondary compact">Sample</button>
          </div>
          <label for="csvFile">Upload question CSV</label>
          <input id="csvFile" type="file" accept=".csv,text/csv" />
          <label for="csvInput">CSV input</label>
          <textarea
            id="csvInput"
            rows="8"
            spellcheck="false"
            placeholder="Question ID,CCTV ID,Time Range,Query"
          ></textarea>
          <div class="action-row">
            <button type="submit" id="runCsvButton">Run CSV</button>
            <button type="button" id="exportCsvButton" class="secondary" disabled>Export answers CSV</button>
            <button type="button" id="clearCsvButton" class="secondary">Clear</button>
          </div>
        </form>
      </section>

      <section class="result-pane" aria-live="polite">
        <div class="metric-strip">
          <div>
            <span>รถไม่ซ้ำ</span>
            <strong id="countMetric">-</strong>
          </div>
          <div>
            <span>Detections</span>
            <strong id="eventMetric">-</strong>
          </div>
          <div>
            <span>Routes</span>
            <strong id="routeMetric">-</strong>
          </div>
        </div>

        <div class="tabs" role="tablist" aria-label="ผลลัพธ์">
          <button class="tab-button active" type="button" data-tab="answer">Answer</button>
          <button class="tab-button" type="button" data-tab="summary">Summary</button>
          <button class="tab-button" type="button" data-tab="routes">Routes</button>
          <button class="tab-button" type="button" data-tab="csv">CSV</button>
          <button class="tab-button" type="button" data-tab="json">JSON</button>
        </div>

        <section class="tab-panel active" id="answerPanel" data-panel="answer">
          <pre id="answerOutput">ผลลัพธ์จะแสดงที่นี่</pre>
        </section>

        <section class="tab-panel" id="summaryPanel" data-panel="summary">
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>Brand</th>
                  <th>Color</th>
                  <th>Count</th>
                </tr>
              </thead>
              <tbody id="summaryRows"></tbody>
            </table>
          </div>
        </section>

        <section class="tab-panel" id="routesPanel" data-panel="routes">
          <div id="routeList" class="route-list"></div>
        </section>

        <section class="tab-panel" id="csvPanel" data-panel="csv">
          <div class="table-wrap csv-results">
            <table>
              <thead>
                <tr>
                  <th>Question ID</th>
                  <th>Readable answer</th>
                  <th>CSV answer</th>
                </tr>
              </thead>
              <tbody id="batchRows"></tbody>
            </table>
          </div>
          <pre id="csvOutput">Question ID,Answer</pre>
        </section>

        <section class="tab-panel" id="jsonPanel" data-panel="json">
          <pre id="jsonOutput">{}</pre>
        </section>
      </section>
    </main>

    <div class="modal-backdrop" id="clarificationModal" hidden>
      <section class="modal-dialog" role="dialog" aria-modal="true" aria-labelledby="clarificationTitle">
        <div class="modal-header">
          <h2 id="clarificationTitle">ตรวจสอบเงื่อนไข</h2>
          <button type="button" id="dismissClarificationButton" class="icon-button" aria-label="Close">×</button>
        </div>
        <p id="clarificationMessage" class="modal-message"></p>
        <ul id="warningList" class="warning-list"></ul>
        <label id="clarificationSelectLabel" for="clarificationSelect">ตัวเลือก</label>
        <select id="clarificationSelect"></select>
        <div class="modal-actions">
          <button type="button" id="applyClarificationButton">ใช้ตัวเลือกนี้</button>
          <button type="button" id="keepCurrentAnswerButton" class="secondary">ใช้คำตอบปัจจุบัน</button>
        </div>
      </section>
    </div>

    <script src="/static/app.js"></script>
  </body>
</html>
